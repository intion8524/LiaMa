<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>BossList Dashboard Pro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; background-color: #f8f9fa; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* สไตล์ช่อง Input */
        .input-group { display: flex; gap: 10px; margin-bottom: 25px; }
        input { flex: 1; padding: 15px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus { border-color: #24b47e; }
        button { padding: 15px 30px; background: #24b47e; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }

        /* สไตล์ตาราง */
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { padding: 15px; color: #666; text-align: center; }
        td { padding: 15px; background: white; text-align: center; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
        td:first-child { border-left: 1px solid #eee; border-top-left-radius: 10px; border-bottom-left-radius: 10px; }
        td:last-child { border-right: 1px solid #eee; border-top-right-radius: 10px; border-bottom-right-radius: 10px; }

        /* แถวสีเทา (ยังไม่ถึงเวลา) */
        .row-waiting { opacity: 0.5; filter: grayscale(100%); background-color: #fcfcfc; }
        /* แถวสีเข้ม (ถึงเวลาแล้ว) */
        .row-active { opacity: 1; filter: none; font-weight: 500; background-color: #ffffff; border: 1px solid #24b47e !important; }

        /* สไตล์หลอด Fade 4 ช่อง */
        .fade-container { display: flex; gap: 4px; justify-content: center; width: 120px; margin: auto; }
        .fade-box { width: 25px; height: 12px; border-radius: 3px; background-color: #e0e0e0; transition: 0.3s; }
        .f1.active { background-color: #4caf50; box-shadow: 0 0 8px #4caf50; } /* เขียว */
        .f2.active { background-color: #ffeb3b; box-shadow: 0 0 8px #ffeb3b; } /* เหลือง */
        .f3.active { background-color: #ff9800; box-shadow: 0 0 8px #ff9800; } /* ส้ม */
        .f4.active { background-color: #f44336; box-shadow: 0 0 8px #f44336; } /* แดง */

        .hour-slot { background: none !important; text-align: left !important; color: #1a73e8; font-weight: bold; font-size: 1.1em; padding-top: 20px !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎮 BossList Live Tracker</h2>
    <label> รูปแบบคำสั่ง </label><br>
    <label>  1) 80.1+10 = บอสแมพ 80 CH 1 จะเกิดอีก 10 นาที </label><br>
    <label>  2) 80.1+1.20 = บอสแมพ 80 CH 1 จะเกิดอีก 1 ชั่วโมง 20 นาที </label><br>
    <label>  3) 80.1/2  = บอสแมพ 80 CH 1 เกิดแล้ว เฟดที่ 2 </label>

    <div class="input-group">
        <input type="text" id="cmd" placeholder="พิมพ์คำสั่ง">
        <button onclick="processCommand()">บันทึก</button>
    </div>
    <div id="tableContent"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    const _db = supabase.createClient('https://xzzanhmsxlkvhmeubsac.supabase.co', 'sb_publishable_yoKH-yeP_emN5fugeo-hZA_1TP1D1p2');

    function createFadeBar(level) {
        return `
            <div class="fade-container">
                <div class="fade-box f1 ${level >= 1 ? 'active' : ''}"></div>
                <div class="fade-box f2 ${level >= 2 ? 'active' : ''}"></div>
                <div class="fade-box f3 ${level >= 3 ? 'active' : ''}"></div>
                <div class="fade-box f4 ${level >= 4 ? 'active' : ''}"></div>
            </div>
        `;
    }

    async function showTable() {
        const { data: list } = await _db.from('BossList').select('*').order('TimeMer', { ascending: true });
        const now = new Date();

        let html = '<table><thead><tr><th>MapNumber</th><th>เวลาที่ปรากฏ</th><th>สถานะ</th></tr></thead><tbody>';

        for (let h = 0; h < 24; h++) {
            const items = list.filter(i => {
                const localTime = new Date(i.TimeMer);
                const hour = new Date(localTime.toLocaleString("en-US", { timeZone: "Asia/Bangkok" })).getHours();
                return hour === h;
            });

            if (items.length > 0) {
                html += `<tr><td colspan="3" class="hour-row hour-slot">⏰ ช่วงเวลา ${h}:00 - ${h+1}:00 น.</td></tr>`;

                items.forEach(i => {
                    const bossTime = new Date(i.TimeMer);

                    // ✅ แปลงเป็นเวลาไทยตรงนี้
                    const thaiTime = new Date(
                        bossTime.toLocaleString("en-US", { timeZone: "Asia/Bangkok" })
                    );

                    const isArrived = bossTime <= new Date() || i.Fade > 0;
                    const rowClass = isArrived ? 'row-active' : 'row-waiting';

                    const timeStr = bossTime.toLocaleTimeString('th-TH', {
                        hour: '2-digit',
                        minute: '2-digit',
                        hour12: false,
                        timeZone: 'Asia/Bangkok'
                    });

                    html += `
                        <tr class="${rowClass}">
                            <td><strong>${i.MapNumber}</strong></td>
                            <td>${timeStr} น. ${isArrived ? '🔥' : '⏳'}</td>
                            <td>${createFadeBar(i.Fade)}</td>
                        </tr>`;
                });
            }
        }

        document.getElementById('tableContent').innerHTML = html + '</tbody></table>';
    }

async function processCommand() {
    const input = document.getElementById('cmd').value.trim();
    if (!input) return;

    let mapNum = "", val = "";
    const isPlus = input.includes('+');
    const isSlash = input.includes('/');

    if (isPlus) [mapNum, val] = input.split('+');
    else if (isSlash) [mapNum, val] = input.split('/');
    else return;

    mapNum = mapNum.trim();

    const { data: old, error } = await _db
        .from('BossList')
        .select('*')
        .eq('MapNumber', mapNum)
        .maybeSingle();

    if (error) {
        console.error(error);
        return;
    }

    // ✅ เคส +
    if (isPlus) {
        if (old) {
            // update
            await _db.from('BossList')
                .update({
                    TimeMer: calcTime(val),
                    Fade: 0
                })
                .eq('id', old.id);
        } else {
            // insert
            await _db.from('BossList')
                .insert([{
                    MapNumber: mapNum,
                    TimeMer: calcTime(val),
                    Fade: 0
                }]);
        }
    }

    // ✅ เคส /
    if (isSlash) {
        if (old) {
            // update fade
            await _db.from('BossList')
                .update({
                    Fade: parseInt(val)
                })
                .eq('id', old.id);
        } else {
            // 🔥 ไม่มีข้อมูล → ต้อง insert ใหม่
            await _db.from('BossList')
                .insert([{
                    MapNumber: mapNum,
                    TimeMer: new Date().toLocaleString('sv-SE', {
        timeZone: 'Asia/Bangkok'
    }).replace(' ', 'T'),
                    Fade: parseInt(val)
                }]);
        }
    }

    document.getElementById('cmd').value = "";
    showTable();
}


 function calcTime(v) {
    const d = new Date();

    if (v.includes('.')) {
        const [h, m] = v.split('.');
        d.setHours(d.getHours() + parseInt(h));
        d.setMinutes(d.getMinutes() + parseInt(m || 0));
    } else {
        d.setMinutes(d.getMinutes() + parseInt(v));
    }

    // ✅ เก็บเป็นเวลาไทย string
    return d.toLocaleString('sv-SE', {
        timeZone: 'Asia/Bangkok'
    }).replace(' ', 'T'); // format: YYYY-MM-DDTHH:mm:ss
}

    _db.channel('any')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'BossList' }, () => showTable())
        .subscribe();

    setInterval(showTable, 30000);
    showTable();

    document.getElementById("cmd").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            processCommand();
        }
    });
</script>
</body>
</html>
