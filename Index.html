<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>BossList Dashboard Pro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; background-color: #f8f9fa; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* สไตล์ช่อง Input */
        .input-group { display: flex; gap: 10px; margin-bottom: 25px; }
        input { flex: 1; padding: 15px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus { border-color: #24b47e; }
        button { padding: 15px 30px; background: #24b47e; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }

        /* สไตล์ตาราง */
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { padding: 15px; color: #666; text-align: center; }
        td { padding: 15px; background: white; text-align: center; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
        td:first-child { border-left: 1px solid #eee; border-top-left-radius: 10px; border-bottom-left-radius: 10px; }
        td:last-child { border-right: 1px solid #eee; border-top-right-radius: 10px; border-bottom-right-radius: 10px; }

        /* แถวสีเทา (ยังไม่ถึงเวลา) */
        .row-waiting { opacity: 0.5; filter: grayscale(100%); background-color: #fcfcfc; }
        /* แถวสีเข้ม (ถึงเวลาแล้ว) */
        .row-active { opacity: 1; filter: none; font-weight: 500; background-color: #ffffff; border: 1px solid #24b47e !important; }

        /* สไตล์หลอด Fade 4 ช่อง */
        .fade-container { display: flex; gap: 4px; justify-content: center; width: 120px; margin: auto; }
        .fade-box { width: 25px; height: 12px; border-radius: 3px; background-color: #e0e0e0; transition: 0.3s; }
        .f1.active { background-color: #4caf50; box-shadow: 0 0 8px #4caf50; } /* เขียว */
        .f2.active { background-color: #ffeb3b; box-shadow: 0 0 8px #ffeb3b; } /* เหลือง */
        .f3.active { background-color: #ff9800; box-shadow: 0 0 8px #ff9800; } /* ส้ม */
        .f4.active { background-color: #f44336; box-shadow: 0 0 8px #f44336; } /* แดง */

        .hour-slot { background: none !important; text-align: left !important; color: #1a73e8; font-weight: bold; font-size: 1.1em; padding-top: 20px !important; }
    .fade-box {
    cursor: pointer;
    }


    .boss-icon {
    font-size: 28px;
    display: inline-block;
}

.boss-active {
    color: #f44336;
    animation: bossGlow 1s infinite alternate;
}

@keyframes bossGlow {
    0% {
        text-shadow: 0 0 5px #f44336, 0 0 10px #f44336;
        transform: scale(1);
    }
    100% {
        text-shadow: 0 0 20px #ff1744, 0 0 30px #ff1744;
        transform: scale(1.25);
    }
}
    </style>
</head>
<body>

<div class="container">
    <h2>🎮 BossList Live Tracker</h2>
    <label> รูปแบบคำสั่ง </label><br>
    <label>  1) 80.1 ,  80-1  = 80 CH 1</label><br>
    <label>  2) 80.1+1.20 = บอสแมพ 80 CH 1 จะเกิดอีก 1 ชั่วโมง 20 นาที </label><br>
    <label>  3) 80.1/2  = บอสแมพ 80 CH 1 เกิดแล้ว เฟดที่ 2 </label>

    <div class="input-group">
        <input type="text" id="cmd" placeholder="พิมพ์คำสั่ง">
        <button onclick="processCommand()">บันทึก</button>
    </div>
    <div id="tableContent"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    const _db = supabase.createClient('https://xzzanhmsxlkvhmeubsac.supabase.co', 'sb_publishable_yoKH-yeP_emN5fugeo-hZA_1TP1D1p2');

function createFadeBar(level, mapNumber) {
    return `
        <div class="fade-container">
            <div class="fade-box f1 ${level >= 1 ? 'active' : ''}" onclick="setFade('${mapNumber}', 1)"></div>
            <div class="fade-box f2 ${level >= 2 ? 'active' : ''}" onclick="setFade('${mapNumber}', 2)"></div>
            <div class="fade-box f3 ${level >= 3 ? 'active' : ''}" onclick="setFade('${mapNumber}', 3)"></div>
            <div class="fade-box f4 ${level >= 4 ? 'active' : ''}" onclick="setFade('${mapNumber}', 4)"></div>
        </div>
    `;
}

async function showTable() {
    const { data: list } = await _db.from('BossList').select('*');
    const now = new Date();

    // 🔥 sort ใหม่ตามที่ต้องการ
    list.sort((a, b) => {
        // ถ้าทั้งคู่มี Fade → เรียง 4 → 1
        if (a.Fade > 0 && b.Fade > 0) {
            return b.Fade - a.Fade;
        }

        // a มี Fade → มาก่อน
        if (a.Fade > 0) return -1;

        // b มี Fade → มาก่อน
        if (b.Fade > 0) return 1;

        // ไม่มี Fade → เรียงตามเวลา
        return new Date(a.TimeMer) - new Date(b.TimeMer);
    });

    //let html = '<table><thead><tr><th>MapNumber</th><th>เวลาที่ปรากฏ</th><th>สถานะ</th></tr></thead><tbody>';
    let html = `
    <table>
    <thead>
    <tr>
        <th>Boss</th>
        <th>MapNumber</th>
        <th>เวลาที่ปรากฏ</th>
        <th>Fade</th>
        <th>BossOn</th>
    </tr>
    </thead>
    <tbody>
    `;

    list.forEach(i => {
        const bossTime = new Date(i.TimeMer);

        // 🔥 logic สถานะ (แก้แล้ว)
        const isArrived = bossTime <= now || i.Fade > 0 || i.BossOn;

        const rowClass = isArrived ? 'row-active' : 'row-waiting';

        const timeStr = bossTime.toLocaleTimeString('th-TH', {
            hour: '2-digit',
            minute: '2-digit',
            hour12: false
        });

        let statusIcon = '⏳';
        if (i.BossOn) statusIcon = '💀'; // บอสเกิดแล้ว
        else if (i.Fade > 0 || bossTime <= now) statusIcon = '🔥';



html += `
<tr class="${rowClass}">

    <!-- 🔥 คอลัมน์ Boss (แสดงเฉพาะตอนเกิด) -->
    <td style="text-align:center;">
        ${i.BossOn 
            ? `<span class="boss-icon boss-active">💀</span>` 
            : ''
        }
    </td>

    <!-- Map -->
    <td><strong>${i.MapNumber} CH ${i.Channel}</strong></td>

    <!-- เวลา -->
    <td>${timeStr} น. ${statusIcon}</td>

    <!-- Fade -->
    <td>
        ${createFadeBar(i.Fade, i.MapNumber)}
    </td>

    <!-- 🔥 ปุ่ม Action -->
    <td style="text-align:center;">
        <button onclick="setBossOn('${i.MapNumber}')"
            style="
                padding:6px 12px;
                border:none;
                border-radius:8px;
                background:${i.BossOn ? '#9e9e9e' : '#f44336'};
                color:white;
                cursor:pointer;
                font-weight:bold;
            ">
            ${i.BossOn ? 'On' : '✔'}
        </button>
    </td>

</tr>
`;


    });

    document.getElementById('tableContent').innerHTML = html + '</tbody></table>';
}

async function processCommand() {
    const input = document.getElementById('cmd').value.trim();
    if (!input) return;

    let rawMap = "", val = "";
    const isPlus = input.includes('+');
    const isSlash = input.includes('/');

    if (isPlus) [rawMap, val] = input.split('+');
    else if (isSlash) [rawMap, val] = input.split('/');
    else return;

    // 🔥 parse map + channel
    const { map, ch } = parseMapInput(rawMap.trim());

    if (!map || isNaN(map)) {
        alert("รูปแบบไม่ถูกต้อง");
        return;
    }

    // 🔍 หา record เดิม
    const { data: old, error } = await _db
        .from('BossList')
        .select('*')
        .eq('MapNumber', map)
        .eq('Channel', ch)
        .maybeSingle();

    if (error) {
        console.error(error);
        return;
    }

    // =========================
    // ✅ เคส +
    // =========================
    if (isPlus) {
        const newTime = calcTime(val);

        if (old) {
            // update
            await _db.from('BossList')
                .update({
                    TimeMer: newTime,
                    Fade: 0,
                    BossOn: false
                })
                .eq('id', old.id);
        } else {
            // insert
            await _db.from('BossList')
                .insert([{
                    MapNumber: map,
                    Channel: ch,
                    TimeMer: newTime,
                    Fade: 0,
                    BossOn: false
                }]);
        }
    }

    // =========================
    // ✅ เคส /
    // =========================
    if (isSlash) {
        const fadeVal = parseInt(val);

        if (old) {
            // update fade + reset boss
            await _db.from('BossList')
                .update({
                    Fade: fadeVal,
                    BossOn: false
                })
                .eq('id', old.id);
        } else {
            // insert ใหม่
            await _db.from('BossList')
                .insert([{
                    MapNumber: map,
                    Channel: ch,
                    TimeMer: new Date(), // 🔥 เวลาไทย
                    Fade: fadeVal,
                    BossOn: false
                }]);
        }
    }

    // 🔄 reset input + refresh
    document.getElementById('cmd').value = "";
    showTable();
}

 function calcTime(v) {
    const d = new Date();

    if (v.includes('.')) {
        const [h, m] = v.split('.');
        d.setHours(d.getHours() + parseInt(h));
        d.setMinutes(d.getMinutes() + parseInt(m || 0));
    } else {
        d.setMinutes(d.getMinutes() + parseInt(v));
    }

    // ✅ เก็บเป็นเวลาไทย string
    return d.toLocaleString('sv-SE', {
        timeZone: 'Asia/Bangkok'
    }).replace(' ', 'T'); // format: YYYY-MM-DDTHH:mm:ss
}

    _db.channel('any')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'BossList' }, () => showTable())
        .subscribe();

    setInterval(showTable, 30000);
    showTable();

    document.getElementById("cmd").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            processCommand();
        }
    });


    async function setFade(mapNumber, fadeLevel) {
    const { data: old } = await _db
        .from('BossList')
        .select('*')
        .eq('MapNumber', mapNumber)
        .maybeSingle();

    if (!old) return;

    await _db.from('BossList')
    .update({ 
        Fade: fadeLevel,
        BossOn: false // 🔥 reset บอสทันที
    })
    .eq('id', old.id);

    showTable(); // รีเฟรช
}




async function setBossOn(mapNumber) {
    const { data: old } = await _db
        .from('BossList')
        .select('*')
        .eq('MapNumber', mapNumber)
        .maybeSingle();

    if (!old) return;

    await _db.from('BossList')
        .update({
            BossOn: true,
            Fade: 4,
            TimeMer: new Date() // รีเซ็ตเวลาเป็นตอนเกิดจริง
        })
        .eq('id', old.id);

    showTable();
}

function parseMapInput(input) {
    let map = null;
    let ch = 1;

    if (input.includes('.') || input.includes('-')) {
        const parts = input.split(/[.-]/);
        map = parseInt(parts[0]);
        ch = parseInt(parts[1] || 1);
    } else {
        map = parseInt(input);
    }

    return {
        map,
        ch
    };
}
</script>
</body>
</html>
